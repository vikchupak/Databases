name: qcp

networks:
  qcp-network:
    name: qcp-network
    driver: bridge

volumes:
  qcp-postgres-data:
    name: qcp-postgres-data

services:
  qcp-postgres:
    container_name: qcp-postgres
    image: postgres:17-alpine
    volumes:
      - qcp-postgres-data:/var/lib/postgresql/data
    networks:
      - qcp-network
    environment:
      POSTGRES_USER: qcp
      POSTGRES_PASSWORD: qcp
      POSTGRES_DB: qcpDb
      TZ: 'UTC'
      PGTZ: 'UTC'
    ports:
      - 5432:5432
    healthcheck:
      # https://docs.docker.com/compose/how-tos/startup-order/
      # https://stackoverflow.com/questions/35069027/docker-wait-for-postgresql-to-be-running
      test: ["CMD-SHELL", "pg_isready -U qcp -d qcpDb"]
      interval: 5s
      timeout: 5s
      retries: 5
